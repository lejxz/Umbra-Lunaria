<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2D4F6" />
      <stop offset="40%" stop-color="#A964FF" />
      <stop offset="100%" stop-color="#3B1C73" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(169, 100, 255, 0.25)" />
      <stop offset="100%" stop-color="rgba(169, 100, 255, 0)" />
    </radialGradient>
    <filter id="blurOuter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <filter id="blurSmall" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="400" cy="400" r="350" fill="url(#glow)" />
  
  <!-- Outer Glow -->
  <path d="M 450,156.4 A 200,200 0 1,0 450,543.6 A 240,240 0 0,1 450,156.4 Z" 
        fill="#A964FF" filter="url(#blurOuter)" opacity="0.6" transform="translate(0, 50)" />

  <!-- Moon Crescent -->
  <path d="M 450,156.4 A 200,200 0 1,0 450,543.6 A 240,240 0 0,1 450,156.4 Z" 
        fill="url(#moonGrad)" transform="translate(0, 50)" />

  <!-- Inner shadow / dark edge to mimic the dark clouds inside the crescent -->
  <path d="M 420,200 A 180,180 0 1,0 420,500 A 220,220 0 0,1 420,200 Z" 
        fill="#0B0914" opacity="0.5" filter="url(#blurSmall)" transform="translate(0, 50)" />

  <!-- Stars -->
  <g fill="#E2D4F6" transform="translate(0, 50)">
    <!-- Star 1 -->
    <path d="M 480,230 L 482,248 L 500,250 L 482,252 L 480,270 L 478,252 L 460,250 L 478,248 Z" />
    <circle cx="480" cy="250" r="10" fill="#A964FF" filter="url(#blurSmall)" opacity="0.8" />
    
    <!-- Star 2 -->
    <path d="M 320,185 L 322,198 L 335,200 L 322,202 L 320,215 L 318,202 L 305,200 L 318,198 Z" />
    <circle cx="320" cy="200" r="6" fill="#A964FF" filter="url(#blurSmall)" opacity="0.8" />
    
    <!-- Star 3 -->
    <path d="M 520,365 L 522,378 L 535,380 L 522,382 L 520,395 L 518,382 L 505,380 L 518,378 Z" />
    <circle cx="520" cy="380" r="6" fill="#A964FF" filter="url(#blurSmall)" opacity="0.8" />
  </g>
</svg>
