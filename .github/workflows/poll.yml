# Manual fallback only — the primary light-poll + daily-batch schedule now
# runs on a third-party cron-job web service for schedule consistency.
# See concept/04-activity-tracking-and-polling.md. Use this workflow via the
# Actions tab ("Run workflow") for ad-hoc ingest runs.
name: Poll Clash of Clans data

on:
  workflow_dispatch: {} # allows manually triggering a run from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Determine if this run is the daily batch
        id: batch
        run: |
          # With no cron triggers, this will always be false
          echo "is_batch=false" >> "$GITHUB_OUTPUT"

      - name: Call /api/ingest
        id: ingest
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"batch\": ${{ steps.batch.outputs.is_batch }}}" \
            "${{ secrets.VERCEL_APP_URL }}/api/ingest")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "http_code=$http_code" >> "$GITHUB_OUTPUT"
          {
            echo "body<<INGEST_BODY_EOF"
            echo "$body"
            echo "INGEST_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "$body"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi

      - name: Write run summary
        if: always()
        run: |
          {
            echo "### Poll result"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Batch run | \`${{ steps.batch.outputs.is_batch }}\` |"
            echo "| HTTP status | \`${{ steps.ingest.outputs.http_code }}\` |"
            echo ""
            echo "**Response:**"
            echo '```json'
            echo '${{ steps.ingest.outputs.body }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
